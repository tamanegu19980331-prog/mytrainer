function getLv(test,val){const v=Number(val)||0;for(const l of test.levels)if(v<=l.max)return l;return test.levels[test.levels.length-1];}

async function callAI(messages,system,maxTokens=1800){
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:maxTokens,system,messages})});
    if(!r.ok){console.error("API error:",r.status);return null;}
    const d=await r.json();return d.content?.[0]?.text||null;
  }catch(e){console.error("callAI error:",e);return null;}
}

      const pt=POSTURE_TYPES.find(p=>p.id===pid);
      if(!pt)return;
      // 各姿勢タイプから2種目（YTWLを含む）
      const exs=pt.exercises.slice(0,2);
      postureExs.push(...exs);
    });
    if(postureExs.length>0){
      // 区切りセパレーター種目を追加
      const separator={
        name:"── 姿勢改善メニュー ──",
        muscle:"",sets:0,reps:"",durationSec:0,restSec:0,
        trainerTip:"ここから姿勢改善トレーニングです",

      selectedMenu.totalCalories=(selectedMenu.totalCalories||0)+(postureExs.length*15);
      selectedMenu.totalDuration=(selectedMenu.totalDuration||0)+(postureExs.length*5);
    }
  }

  return {
    userTypeIds:detectedTypes,typeReason:mainType.label+"と判定。"+mainType.summary.slice(0,30),

    foodAdvice:food,roadmap,menu:selectedMenu,
  };

function Welcome({onNext}){return(<div style={S.wrap}><div style={{flex:1,display:"flex",flexDirection:"column",justifyContent:"center",padding:"0 18px"}}><div style={{textAlign:"center",marginBottom:24}}><div style={{fontSize:64,marginBottom:10}}>⚡</div><span style={{...S.lbl,display:"inline-block",marginBottom:8}}>AI Personal Trainer</span><div style={S.h1}>あなただけの<br/><span style={{color:"#39ff14"}}>マイトレーナー</span></div><p style={{fontSize:13,color:"#666",lineHeight:1.7,marginTop:10}}>現役パーソナルトレーナー監修の診断で<br/>あなただけのメニューを完全自動生成</p></div>{[{i:"① 身体データ",t:"BMI・性別・体型ゴール選択",c:"#00c8ff"},{i:"② 診断タイプ",t:"生活習慣・目標・続かない理由",c:"#39ff14"},{i:"③ 筋力テスト",t:"腕立て・腹筋・プランクで実力測定",c:"#ffd60a"},{i:"⬇ AI統合分析",t:"診断から週間スケジュール＋今日のメニューを生成",c:"#cc44ff"}].map((f,i)=>(<div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",background:"#1e1e26",borderRadius:10,border:"1px solid #2a2a36",marginBottom:7}}><span style={{fontSize:12,fontWeight:800,color:f.c,minWidth:80}}>{f.i}</span><span style={{fontSize:12,color:"#666"}}>{f.t}</span></div>))}<div style={{marginTop:20}}><Btn onClick={onNext}>診断をはじめる →</Btn><p style={{textAlign:"center",fontSize:11,color:"#666",marginTop:8}}>現役トレーナー監修 · 約4分 · 無料</p></div></div></div>);}

function Profile({onNext,profile,setProfile}){const bmi=profile.height&&profile.weight?(Number(profile.weight)/((Number(profile.height)/100)**2)).toFixed(1):null;const bmiC=!bmi?null:bmi<18.5?"#00c8ff":bmi<25?"#39ff14":bmi<30?"#ffd60a":"#ff4455";const bmiL=!bmi?"":bmi<18.5?"低体重":bmi<25?"標準":bmi<30?"過体重":"肥満";const ok=profile.name&&profile.gender&&profile.height&&profile.weight;return(<div style={S.wrap}><div style={S.hdr}><span style={S.logo}>⚡ My Trainer</span><span style={{marginLeft:"auto",fontSize:11,color:"#666"}}>① 身体データ</span></div><div style={S.card}><span style={S.lbl}>Step 1 — プロフィール</span><div style={S.h1}>基本情報を入力</div><p style={{fontSize:13,color:"#666",marginBottom:16}}>性別によって診断内容と体型ゴールが変わります。</p><label style={{...S.lbl,color:"#666"}}>ニックネーム</label><input style={S.inp} placeholder="例：まつだ" value={profile.name} onChange={e=>setProfile(p=>({...p,name:e.target.value}))}/><label style={{...S.lbl,color:"#666"}}>性別</label><div style={{display:"flex",gap:8,marginBottom:12}}>{["男性","女性"].map(g=><button key={g} onClick={()=>setProfile(p=>({...p,gender:g}))} style={{flex:1,padding:"14px",background:profile.gender===g?"rgba(57,255,20,0.1)":"#25252f",border:`2px solid ${profile.gender===g?"#39ff14":"#2a2a36"}`,borderRadius:12,color:profile.gender===g?"#39ff14":"#666",fontSize:15,fontWeight:profile.gender===g?800:400,cursor:"pointer"}}>{g==="男性"?"👨 男性":"👩 女性"}</button>)}</div><div style={{display:"flex",gap:10}}><div style={{flex:1}}><label style={{...S.lbl,color:"#666"}}>身長 (cm)</label><input style={S.inp} type="number" placeholder="170" value={profile.height} onChange={e=>setProfile(p=>({...p,height:e.target.value}))}/></div><div style={{flex:1}}><label style={{...S.lbl,color:"#666"}}>体重 (kg)</label><input style={S.inp} type="number" placeholder="65" value={profile.weight} onChange={e=>setProfile(p=>({...p,weight:e.target.value}))}/></div></div>{bmi&&<div style={{background:"#25252f",border:"1px solid #2a2a36",borderRadius:10,padding:"10px 14px",marginBottom:12}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}><span style={{fontSize:12,color:"#666"}}>BMI</span><span style={{fontSize:18,fontWeight:800,color:bmiC}}>{bmi} <span style={{fontSize:11,fontWeight:400,color:"#666"}}>{bmiL}</span></span></div><PBar v={Math.min(Number(bmi),40)} max={40} color={bmiC} h={4}/></div>}<Btn onClick={onNext} disabled={!ok}>体型ゴールを選ぶ →</Btn></div></div>);}

</script>

function GoalSelect({onNext,profile,goal,setGoal}){
  const [selId,setSelId]=useState(null);
  const [info,setInfo]=useState(null);
  function pick(id){
    var d=GOAL_PERSONS.find(function(x){return x.id===id;});
    if(!d)return;
    setSelId(id);setGoal(id);setInfo(d);
  }
  var CE=React.createElement;
  var overlays=GOAL_PERSONS.map(function(p){
    var isSel=selId===p.id;
    return CE("div",{key:p.id,onClick:function(){pick(p.id);},style:{position:"absolute",left:p.left+"%",top:p.top+"%",width:p.w+"%",height:p.h+"%",cursor:"pointer"}},

    );
  });
  var infoEl=null;
  if(info){
    var isMale=info.gender==="M";
    infoEl=CE("div",{style:{marginTop:12,padding:"12px 14px",background:isMale?"rgba(74,144,217,0.1)":"rgba(232,117,138,0.1)",border:"1px solid "+info.color+"66",borderRadius:12,display:"flex",alignItems:"center",gap:10}},
      CE("div",{style:{fontSize:22}},isMale?"💪":"✨"),
      CE("div",{style:{flex:1}},
        CE("div",{style:{fontSize:12,fontWeight:800,color:info.color,marginBottom:2}},info.label+" / 体脂肪率 "+info.pct),
        CE("div",{style:{fontSize:11,color:"#666",lineHeight:1.5}},info.feat)
      )
    );
  }
  return CE("div",{style:{...S.wrap}},
    CE("div",{style:{...S.hdr}},
      CE("span",{style:{...S.logo}},"⚡ My Trainer"),
      CE("span",{style:{marginLeft:"auto",fontSize:11,color:"#666"}},"① 体型ゴール")
    ),
    CE("div",{style:{padding:"12px 12px 0"}},
      CE("span",{style:{fontSize:10,letterSpacing:2,color:"#39ff14",textTransform:"uppercase",fontWeight:700,display:"block",marginBottom:6}},"Step 1-2 — 理想の体型"),
      CE("p",{style:{fontSize:12,color:"#666",marginBottom:12,lineHeight:1.6}},"タップして目指したい体型を選んでください"),
      CE("div",{style:{position:"relative",width:"100%",borderRadius:14,overflow:"hidden",boxShadow:"0 8px 24px rgba(0,0,0,0.5)"}},
        CE("img",{src:GOAL_SRC,style:{width:"100%",display:"block"},alt:"体型選択"}),

      ),
      infoEl,
      CE("div",{style:{marginTop:12}},CE(Btn,{disabled:!selId,onClick:onNext},"診断へ進む →"))
    )
  );
}

// ===== 姿勢チェック画面 =====
function PostureCheck({onNext, posture, setPosture}) {
  const [selected, setSelected] = useState(posture || []);
  const [checkMode, setCheckMode] = useState(null); // セルフチェック表示

  const toggle = (id) => {
    setSelected(s => s.includes(id) ? s.filter(x=>x!==id) : [...s,id]);
  };

  const confirm = () => {
    setPosture(selected);
    onNext();
  };

  if(checkMode) {
    const pt = POSTURE_TYPES.find(p=>p.id===checkMode);
    return(
      <div style={S.wrap}>
        <div style={S.hdr}>
          <button onClick={()=>setCheckMode(null)} style={{background:"none",border:"none",color:"#666",fontSize:20,cursor:"pointer",marginRight:8}}>←</button>
          <span style={{...S.logo,color:"#cc44ff"}}>🔍 セルフチェック</span>
        </div>
        <div style={{...S.card,borderColor:pt.color+"66"}}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
            <span style={{fontSize:36}}>{pt.emoji}</span>
            <div><div style={{fontSize:16,fontWeight:800,color:pt.color}}>{pt.label}</div></div>
          </div>
          {[
            {label:"✅ チェック方法",color:"#39ff14",text:pt.check},
            {label:"⚠️ 主な原因",color:"#ffd60a",text:pt.cause},
            {label:"😔 放置すると...",color:"#ff4455",text:pt.effect},
            {label:"💪 改善アプローチ",color:"#00c8ff",text:pt.improve},
          ].map(item=>(
            <div key={item.label} style={{padding:"10px 12px",background:"#25252f",borderRadius:10,marginBottom:8,borderLeft:`3px solid ${item.color}`}}>
              <div style={{fontSize:10,color:item.color,fontWeight:700,marginBottom:3}}>{item.label}</div>
              <div style={{fontSize:13,color:"#e8e8e8",lineHeight:1.6}}>{item.text}</div>
            </div>
          ))}
          <div style={{marginTop:4}}>
            <Btn onClick={()=>{toggle(pt.id);setCheckMode(null);}} style={{background:selected.includes(pt.id)?"#ff4455":pt.color,color:"#fff"}}>
              {selected.includes(pt.id)?"✓ 選択済み（タップで解除）":"この姿勢タイプを選択する"}
            </Btn>
          </div>
        </div>
      </div>
    );
  }

  return(
    <div style={S.wrap}>
      <div style={S.hdr}>
        <span style={{...S.logo,color:"#cc44ff"}}>🧍 姿勢チェック</span>
        <span style={{marginLeft:"auto",fontSize:11,color:"#666"}}>複数選択可</span>
      </div>
      <div style={{padding:"10px 12px 0"}}>
        <PBar v={selected.length} max={9} color="#cc44ff" h={4}/>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
          <span style={{fontSize:11,color:"#cc44ff",fontWeight:700}}>{selected.length}項目選択中</span>
          <span style={{fontSize:11,color:"#666"}}>「詳細・チェック方法」で確認できます</span>
        </div>
      </div>

      <div style={{padding:"12px 12px 0"}}>
        <div style={{background:"rgba(204,68,255,0.08)",border:"1px solid rgba(204,68,255,0.3)",borderRadius:12,padding:"12px 14px",marginBottom:14}}>
          <div style={{fontSize:11,color:"#cc44ff",fontWeight:700,marginBottom:4}}>📋 使い方</div>
          <div style={{fontSize:12,color:"#666",lineHeight:1.7}}>
            当てはまると思う姿勢タイプを<strong style={{color:"#e8e8e8"}}>複数選択</strong>してください。<br/>
            「詳細・チェック方法」でセルフチェックの方法も確認できます。<br/>
            選択した姿勢に合わせた<strong style={{color:"#cc44ff"}}>改善メニュー</strong>を自動生成します。
          </div>
        </div>

        {POSTURE_TYPES.map(pt=>(
          <div key={pt.id} style={{
            background:selected.includes(pt.id)?pt.color+"15":"#1e1e26",
            border:`2px solid ${selected.includes(pt.id)?pt.color:"#2a2a36"}`,
            borderRadius:14,padding:"14px",marginBottom:10,
            transition:"all 0.18s",
          }}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div onClick={()=>toggle(pt.id)} style={{
                width:24,height:24,borderRadius:"50%",
                background:selected.includes(pt.id)?pt.color:"#25252f",
                border:`2px solid ${selected.includes(pt.id)?pt.color:"#2a2a36"}`,
                display:"flex",alignItems:"center",justifyContent:"center",
                fontSize:12,fontWeight:900,color:"#fff",cursor:"pointer",flexShrink:0,
              }}>{selected.includes(pt.id)?"✓":""}</div>
              <div onClick={()=>toggle(pt.id)} style={{flex:1,cursor:"pointer"}}>
                <div style={{fontSize:14,fontWeight:800,color:selected.includes(pt.id)?pt.color:"#e8e8e8"}}>
                  {pt.emoji} {pt.label}
                </div>
                <div style={{fontSize:11,color:"#555",marginTop:2,lineHeight:1.4}}>{pt.check.slice(0,35)}...</div>
              </div>
              <button onClick={()=>setCheckMode(pt.id)} style={{
                padding:"5px 10px",background:"transparent",
                border:`1px solid ${pt.color}66`,borderRadius:8,
                color:pt.color,fontSize:10,fontWeight:700,cursor:"pointer",flexShrink:0,
              }}>詳細・<br/>チェック</button>
            </div>
          </div>
        ))}

        <div style={{marginTop:8,marginBottom:4}}>
          <Btn onClick={confirm}>
            {selected.length===0?"姿勢の問題なし・スキップ →":`${selected.length}項目を選択して次へ →`}
          </Btn>
        </div>
        <p style={{textAlign:"center",fontSize:11,color:"#555",marginTop:6,marginBottom:20}}>
          姿勢の問題がない場合はスキップできます
        </p>
      </div>
    </div>
  );
}

// レベルテーブル
const LEVELS = [
  {lv:1,  title:"入門者",     minExp:0,    color:"#666",    emoji:"🌱"},
  {lv:2,  title:"見習い",     minExp:100,  color:"#00c8ff", emoji:"💧"},
  {lv:3,  title:"トレーニー", minExp:250,  color:"#39ff14", emoji:"⚡"},
  {lv:4,  title:"戦士",       minExp:500,  color:"#ffd60a", emoji:"🔥"},
  {lv:5,  title:"猛者",       minExp:900,  color:"#ff8c00", emoji:"💪"},
  {lv:6,  title:"エース",     minExp:1500, color:"#ff4455", emoji:"🏆"},
  {lv:7,  title:"マスター",   minExp:2500, color:"#cc44ff", emoji:"👑"},
  {lv:8,  title:"レジェンド", minExp:4000, color:"#ffd60a", emoji:"🌟"},
];

const HAIR_STYLES_M = ["短髪","リーゼント","坊主","マッシュ","ロング"];
const HAIR_STYLES_F = ["ショート","ボブ","ポニー","ロング","ツイン"];
const SKIN_COLORS   = ["#FDBCB4","#E8A87C","#D4883A","#8D5524","#4A2912"];
const HAIR_COLORS   = ["#2C1810","#8B4513","#DAA520","#FF6B35","#9B59B6","#1ABC9C"];
const ACCENT_COLORS = ["#39ff14","#00c8ff","#ff4455","#ffd60a","#cc44ff","#ff8c00"];

function getLevelInfo(exp) {
  let cur = LEVELS[0];
  for(const lv of LEVELS) { if(exp >= lv.minExp) cur = lv; else break; }
  const next = LEVELS.find(l => l.lv === cur.lv + 1);
  const progress = next
    ? Math.min(((exp - cur.minExp) / (next.minExp - cur.minExp)) * 100, 100)
    : 100;
  return { ...cur, next, progress, exp };
}

function getEXP() {
  try { return Number(localStorage.getItem(EXP_KEY)||0); } catch{ return 0; }
}
function addEXP(amount) {
  try {
    const cur = getEXP();
    localStorage.setItem(EXP_KEY, String(cur + amount));
    return cur + amount;
  } catch{ return 0; }
}
function loadAvatar() {
  try { return JSON.parse(localStorage.getItem(AVATAR_KEY)||"null"); } catch{ return null; }
}
function saveAvatar(av) {
  try { localStorage.setItem(AVATAR_KEY, JSON.stringify(av)); } catch{}
}

// SVGアバター描画
function AvatarSVG({avatar, size=80, exp=0}) {
  const lv = getLevelInfo(exp);
  const s = avatar || {gender:"M", skin:"#FDBCB4", hair:"#2C1810", accent:"#39ff14", hairStyle:0};
  const isFemale = s.gender === "F";
  const sc = size/100;

  // レベルによって体格が変化
  const muscleScale = Math.min(1 + (lv.lv-1)*0.06, 1.5);
  const shoulderW   = isFemale ? 22 : 24 * muscleScale;
  const armW        = isFemale ? 5  : 5  * muscleScale;

  return (
    <svg width={size} height={size} viewBox="0 0 100 100">
      {/* 背景 */}
      <circle cx="50" cy="50" r="48" fill={s.accent+"22"} stroke={s.accent} strokeWidth="2"/>

      {/* レベルオーラ（高レベルほど強く） */}
      {lv.lv >= 4 && (
        <circle cx="50" cy="50" r="46" fill="none" stroke={lv.color} strokeWidth="1.5" opacity="0.5"
          strokeDasharray={lv.lv >= 6 ? "3 3" : lv.lv >= 4 ? "5 5" : ""}/>
      )}

      {/* 首 */}
      <rect x="45" y="38" width="10" height="10" rx="3" fill={s.skin}/>

      {/* 胴体 */}
      <path d={`M${50-shoulderW} 48 Q50 45 ${50+shoulderW} 48 L${50+16} 78 Q50 80 ${50-16} 78 Z`}
        fill={s.accent} opacity="0.9"/>

      {/* 腕 */}
      <rect x={50-shoulderW-armW} y="48" width={armW+2} height={isFemale?22:24*muscleScale} rx="4" fill={s.skin}/>
      <rect x={50+shoulderW-2}    y="48" width={armW+2} height={isFemale?22:24*muscleScale} rx="4" fill={s.skin}/>

      {/* 足 */}
      <rect x="38" y="78" width="10" height="16" rx="4" fill={s.accent} opacity="0.8"/>
      <rect x="52" y="78" width="10" height="16" rx="4" fill={s.accent} opacity="0.8"/>

      {/* 頭 */}
      <ellipse cx="50" cy="28" rx="15" ry="16" fill={s.skin}/>

      {/* 髪型 */}
      {s.hairStyle === 0 && <ellipse cx="50" cy="17" rx="15" ry="8" fill={s.hair}/>}
      {s.hairStyle === 1 && <>
        <ellipse cx="50" cy="17" rx="15" ry="8" fill={s.hair}/>
        <path d="M50 12 Q55 5 58 8" stroke={s.hair} strokeWidth="4" fill="none" strokeLinecap="round"/>
      </>}
      {s.hairStyle === 2 && <ellipse cx="50" cy="16" rx="15" ry="6" fill={s.hair}/>}
      {s.hairStyle === 3 && <>
        <ellipse cx="50" cy="17" rx="15" ry="8" fill={s.hair}/>
        <ellipse cx="50" cy="18" rx="13" ry="9" fill={s.hair} opacity="0.7"/>
      </>}
      {s.hairStyle === 4 && <>
        <ellipse cx="50" cy="17" rx="15" ry="8" fill={s.hair}/>
        {isFemale && <>
          <path d="M35 25 Q30 45 32 60" stroke={s.hair} strokeWidth="6" fill="none" strokeLinecap="round"/>
          <path d="M65 25 Q70 45 68 60" stroke={s.hair} strokeWidth="6" fill="none" strokeLinecap="round"/>
        </>}
      </>}

      {/* 顔パーツ */}
      <ellipse cx="44" cy="28" rx="2.5" ry="2.5" fill="#333"/>
      <ellipse cx="56" cy="28" rx="2.5" ry="2.5" fill="#333"/>
      {isFemale
        ? <path d="M45 34 Q50 38 55 34" stroke="#ff6b9d" strokeWidth="1.5" fill="none" strokeLinecap="round"/>
        : <path d="M45 34 Q50 37 55 34" stroke="#555"    strokeWidth="1.5" fill="none" strokeLinecap="round"/>
      }

      {/* レベルバッジ */}
      <circle cx="82" cy="18" r="12" fill={lv.color} opacity="0.95"/>
      <text x="82" y="22" textAnchor="middle" fill="#000" fontSize="10" fontWeight="800">
        {lv.lv}
      </text>
    </svg>
  );
}

// ===== アバターステータスバー（ヘッダー用コンパクト版） =====
function AvatarStatusBar({avatar, exp, onClick}) {
  const lv   = getLevelInfo(exp);
  const next = lv.next;
  const cur  = exp - lv.minExp;
  const need = next ? next.minExp - lv.minExp : 1;
  const pct  = Math.min((cur/need)*100,100);

  return (
    <div onClick={onClick} style={{
      display:"flex",alignItems:"center",gap:10,
      padding:"8px 12px",
      background:"rgba(255,215,10,0.06)",
      border:"1px solid rgba(255,215,10,0.2)",
      borderRadius:12,margin:"8px 12px 0",cursor:"pointer",
    }}>
      <AvatarSVG avatar={avatar} size={44} exp={exp}/>
      <div style={{flex:1,minWidth:0}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
          <span style={{fontSize:12,fontWeight:800,color:lv.color}}>
            {lv.emoji} Lv.{lv.lv} {lv.title}
          </span>
          <span style={{fontSize:10,color:"#666"}}>{exp} EXP</span>
        </div>
        <div style={{background:"#2a2a36",borderRadius:4,overflow:"hidden",height:5}}>
          <div style={{height:"100%",width:pct+"%",background:lv.color,borderRadius:4,transition:"width 0.5s"}}/>
        </div>
        <div style={{fontSize:9,color:"#555",marginTop:2,textAlign:"right"}}>
          {next ? `次のレベルまで ${next.minExp-exp} EXP` : "MAX LEVEL"}
        </div>
      </div>
    </div>
  );
}

// ===== 体重・体組成グラフ =====
const STORAGE_KEY_BODY = "mt_body_records";

function loadBodyRecords(){ try{return JSON.parse(localStorage.getItem(STORAGE_KEY_BODY)||"[]");}catch{return[];} }
function saveBodyRecords(r){ try{localStorage.setItem(STORAGE_KEY_BODY,JSON.stringify(r));}catch{} }

function BodyGraph({profile}){
  const [records,setRecords]=useState(()=>loadBodyRecords());
  const [form,setForm]=useState({weight:"",fat:"",muscle:""});
  const [showForm,setShowForm]=useState(false);
  const [saved,setSaved]=useState(false);
  const [viewType,setViewType]=useState("weight"); // weight / fat / muscle / bmi

  const addRecord=()=>{
    if(!form.weight)return;
    const bmi=profile.height?(Number(form.weight)/((Number(profile.height)/100)**2)).toFixed(1):null;
    const rec={
      id:Date.now(),
      date:new Date().toLocaleDateString("ja-JP",{month:"short",day:"numeric"}),
      dateRaw:new Date().toISOString().slice(0,10),
      weight:Number(form.weight),
      fat:form.fat?Number(form.fat):null,
      muscle:form.muscle?Number(form.muscle):null,
      bmi:bmi?Number(bmi):null,
    };
    const updated=[...records,rec].slice(-60); // 最大60件
    setRecords(updated);
    saveBodyRecords(updated);
    setForm({weight:"",fat:"",muscle:""});
    setShowForm(false);
    setSaved(true);
    setTimeout(()=>setSaved(false),2000);
  };

  const deleteRecord=(id)=>{
    const updated=records.filter(r=>r.id!==id);
    setRecords(updated);
    saveBodyRecords(updated);
  };

  // グラフデータ（直近14件）
  const recent=records.slice(-14);
  const vals=recent.map(r=>viewType==="weight"?r.weight:viewType==="fat"?r.fat:viewType==="muscle"?r.muscle:r.bmi).filter(v=>v!=null);
  const minV=vals.length?Math.min(...vals):0;
  const maxV=vals.length?Math.max(...vals):1;
  const range=maxV-minV||1;

  const GRAPH_W=320;
  const GRAPH_H=120;
  const PAD={l:36,r:12,t:12,b:28};
  const plotW=GRAPH_W-PAD.l-PAD.r;
  const plotH=GRAPH_H-PAD.t-PAD.b;

  const colorMap={weight:"#39ff14",fat:"#ff4455",muscle:"#00c8ff",bmi:"#ffd60a"};
  const labelMap={weight:"体重(kg)",fat:"体脂肪率(%)",muscle:"筋肉量(kg)",bmi:"BMI"};
  const col=colorMap[viewType];

  // 有効なデータ点のみプロット
  const points=recent
    .map((r,i)=>({
      x:PAD.l+(i/(Math.max(recent.length-1,1)))*plotW,
      y:PAD.t+plotH-(((viewType==="weight"?r.weight:viewType==="fat"?r.fat:viewType==="muscle"?r.muscle:r.bmi)||0)-minV)/range*plotH,
      val:viewType==="weight"?r.weight:viewType==="fat"?r.fat:viewType==="muscle"?r.muscle:r.bmi,
      date:r.date,
      valid:(viewType==="weight"?r.weight:viewType==="fat"?r.fat:viewType==="muscle"?r.muscle:r.bmi)!=null,
    }))
    .filter(p=>p.valid);

  const pathD=points.length>1
    ?points.map((p,i)=>(i===0?"M":"L")+p.x.toFixed(1)+","+p.y.toFixed(1)).join(" ")
    :"";

  // 最新値と変化
  const latest=records.length?records[records.length-1]:null;
  const prev=records.length>1?records[records.length-2]:null;
  const getVal=(r)=>viewType==="weight"?r?.weight:viewType==="fat"?r?.fat:viewType==="muscle"?r?.muscle:r?.bmi;
  const latestVal=getVal(latest);
  const prevVal=getVal(prev);
  const diff=latestVal!=null&&prevVal!=null?(latestVal-prevVal).toFixed(1):null;

  // グリッド線（3本）
  const gridLines=[0,0.5,1].map(ratio=>({
    y:(PAD.t+plotH*(1-ratio)).toFixed(1),
    label:(minV+range*ratio).toFixed(1),
  }));

  return(
    <div>
      {/* ヘッダー */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <span style={{...S.lbl,marginBottom:0}}>📊 体重・体組成の記録</span>
        <button onClick={()=>setShowForm(f=>!f)}
          style={{padding:"6px 14px",background:"#39ff14",color:"#000",border:"none",
            borderRadius:8,fontSize:12,fontWeight:800,cursor:"pointer"}}>
          {showForm?"閉じる":"＋ 記録する"}
        </button>
      </div>

      {/* 保存メッセージ */}
      {saved&&<div style={{padding:"8px 12px",background:"rgba(57,255,20,0.1)",border:"1px solid #1a6600",
        borderRadius:8,fontSize:12,color:"#39ff14",textAlign:"center",marginBottom:10}}>
        ✅ 記録しました！
      </div>}

      {/* 入力フォーム */}
      {showForm&&<div style={{background:"#25252f",borderRadius:12,padding:"14px",marginBottom:14,border:"1px solid #2a2a36"}}>
        <div style={{fontSize:11,color:"#39ff14",fontWeight:700,marginBottom:10}}>今日の体組成を入力</div>
        <div style={{display:"flex",gap:8,marginBottom:10}}>
          <div style={{flex:1}}>
            <div style={{fontSize:10,color:"#666",marginBottom:3}}>体重 (kg) *</div>
            <input style={{...S.inp,marginBottom:0,textAlign:"center",fontSize:18,fontWeight:800,color:"#39ff14"}}
              type="number" step="0.1" placeholder="65.0"
              value={form.weight} onChange={e=>setForm(f=>({...f,weight:e.target.value}))}/>
          </div>
          <div style={{flex:1}}>
            <div style={{fontSize:10,color:"#666",marginBottom:3}}>体脂肪率 (%)</div>
            <input style={{...S.inp,marginBottom:0,textAlign:"center",fontSize:18,fontWeight:800,color:"#ff4455"}}
              type="number" step="0.1" placeholder="20.0"
              value={form.fat} onChange={e=>setForm(f=>({...f,fat:e.target.value}))}/>
          </div>
          <div style={{flex:1}}>
            <div style={{fontSize:10,color:"#666",marginBottom:3}}>筋肉量 (kg)</div>
            <input style={{...S.inp,marginBottom:0,textAlign:"center",fontSize:18,fontWeight:800,color:"#00c8ff"}}
              type="number" step="0.1" placeholder="50.0"
              value={form.muscle} onChange={e=>setForm(f=>({...f,muscle:e.target.value}))}/>
          </div>
        </div>
        <Btn onClick={addRecord} disabled={!form.weight}>記録する →</Btn>
      </div>}

      {/* 最新値サマリー */}
      {latest&&<div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginBottom:14}}>
        {[
          {label:"体重",val:latest.weight,unit:"kg",color:"#39ff14"},
          {label:"体脂肪率",val:latest.fat,unit:"%",color:"#ff4455"},
          {label:"筋肉量",val:latest.muscle,unit:"kg",color:"#00c8ff"},
          {label:"BMI",val:latest.bmi,unit:"",color:"#ffd60a"},
        ].map(item=>(
          <div key={item.label} style={{background:"#25252f",borderRadius:10,padding:"8px 6px",textAlign:"center",
            border:`1px solid ${item.val!=null?item.color+"44":"#2a2a36"}`}}>
            <div style={{fontSize:9,color:"#666",marginBottom:2}}>{item.label}</div>
            <div style={{fontSize:item.val!=null?16:12,fontWeight:800,color:item.val!=null?item.color:"#333"}}>
              {item.val!=null?item.val+item.unit:"--"}
            </div>
          </div>
        ))}
      </div>}

      {/* グラフ切替 */}
      {records.length>0&&<>
        <div style={{display:"flex",gap:6,marginBottom:10}}>
          {[["weight","体重"],["fat","体脂肪"],["muscle","筋肉量"],["bmi","BMI"]].map(([k,l])=>(
            <button key={k} onClick={()=>setViewType(k)}
              style={{flex:1,padding:"6px 4px",borderRadius:8,fontSize:10,fontWeight:700,cursor:"pointer",
                background:viewType===k?colorMap[k]+"22":"#25252f",
                border:`1px solid ${viewType===k?colorMap[k]:"#2a2a36"}`,
                color:viewType===k?colorMap[k]:"#555"}}>
              {l}
            </button>
          ))}
        </div>

        {/* SVGグラフ */}
        <div style={{background:"#1a1a24",borderRadius:12,padding:"10px",marginBottom:14,
          border:"1px solid #2a2a36",overflowX:"auto"}}>
          {/* 変化サマリー */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <span style={{fontSize:11,color:"#666"}}>{labelMap[viewType]}</span>
            {diff&&<span style={{fontSize:12,fontWeight:800,
              color:Number(diff)>0?(viewType==="muscle"?"#39ff14":"#ff4455"):(viewType==="muscle"?"#ff4455":"#39ff14")}}>
              {Number(diff)>0?"+":""}{diff} {viewType==="fat"?"%":"kg"}
            </span>}

        <div style={{fontSize:10,color:"#666",fontWeight:700,letterSpacing:1,marginBottom:8,textTransform:"uppercase"}}>

          <div key={r.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",
            padding:"8px 10px",background:"#25252f",borderRadius:8,marginBottom:6,border:"1px solid #2a2a36"}}>
            <div style={{fontSize:11,color:"#666",minWidth:60}}>{r.date}</div>
            <div style={{display:"flex",gap:14,fontSize:12}}>

              {r.muscle!=null&&<span style={{color:"#00c8ff"}}>{r.muscle}kg</span>}
              {r.bmi!=null&&<span style={{color:"#ffd60a"}}>BMI:{r.bmi}</span>}
            </div>
            <button onClick={()=>deleteRecord(r.id)}
              style={{background:"none",border:"none",color:"#333",cursor:"pointer",fontSize:14}}>🗑</button>
          </div>
        ))}

      {records.length===0&&<div style={{textAlign:"center",padding:"30px 0",color:"#444"}}>
        <div style={{fontSize:32,marginBottom:8}}>📊</div>
        <div style={{fontSize:13,marginBottom:4}}>まだ記録がありません</div>
        <div style={{fontSize:11}}>「＋ 記録する」から体重を入力してください</div>
      </div>}
    </div>
  );
}

function Diag({onNext,profile,diag,setDiag}){
  const tree=profile.gender==="女性"?FT:MT;

  const curId=hist[hist.length-1];
  const curQ=tree.questions[curId];
  const ac=profile.gender==="女性"?"#ff6b9d":"#39ff14";
  const sel=(opt)=>{setDiag(d=>({...d,[curId]:opt.l}));if(opt.n===null)onNext();else setHist(h=>[...h,opt.n]);};
  const back=()=>{if(hist.length>1){setHist(h=>h.slice(0,-1));setDiag(d=>{const nd={...d};delete nd[curId];return nd;});}};
  return(
    <div style={S.wrap}>
      <div style={{...S.hdr,borderBottom:`1px solid ${ac}40`}}><span style={{...S.logo,color:ac}}>② 診断タイプ</span><span style={{marginLeft:"auto",fontSize:11,color:"#666"}}>Q{hist.length}</span></div>

      </div>
      <div style={{padding:"12px 12px 0"}}>{hist.length>1&&<Btn outline onClick={back}>← 戻る</Btn>}</div>

        {phase==="input"&&<><div style={{background:"rgba(255,215,10,0.1)",border:"1px solid rgba(255,215,10,0.3)",borderRadius:10,padding:"10px 14px",marginBottom:14}}><div style={{fontSize:12,color:"#ffd60a",lineHeight:1.6}}>アニメーションを参考にフォームを確認しながら行ってください。終わったら結果を入力！</div></div><label style={{...S.lbl,color:"#666"}}>結果を入力（{test.unit}）</label><div style={{display:"flex",gap:10,alignItems:"center",marginBottom:12}}><input style={{...S.inp,marginBottom:0,flex:1,fontSize:28,fontWeight:800,textAlign:"center",color:"#39ff14"}} type="number" placeholder="0" value={val} onChange={e=>setVal(e.target.value)}/><span style={{fontSize:18,color:"#666",fontWeight:700}}>{test.unit}</span></div>{val&&<div style={{background:"#25252f",borderRadius:10,padding:"8px 12px",marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:12,color:"#666"}}>判定</span><span style={{fontSize:14,fontWeight:800,color:getLv(test,val).color}}>{getLv(test,val).label}</span></div>}<Btn disabled={!val} style={{background:"#ffd60a",color:"#000"}} onClick={confirm}>この結果で確定 →</Btn><Btn outline onClick={()=>setPhase("intro")} style={{borderColor:"#ffd60a",color:"#ffd60a"}}>← やり方を確認する</Btn></>}
        {phase==="result"&&cur&&<><div style={{textAlign:"center",padding:"12px 0"}}><div style={{fontSize:52,fontWeight:800,color:cur.lv.color,marginBottom:4}}>{cur.value}<span style={{fontSize:18}}>{test.unit}</span></div><div style={{display:"inline-block",padding:"6px 20px",background:cur.lv.color+"20",border:`2px solid ${cur.lv.color}`,borderRadius:30,fontSize:16,fontWeight:800,color:cur.lv.color,marginBottom:12}}>{cur.lv.label}</div><PBar v={cur.lv.score} max={10} color={cur.lv.color} h={8}/><div style={{fontSize:10,color:cur.lv.color,textAlign:"right",marginTop:2}}>{cur.lv.score}/10点</div></div><Btn style={{background:isLast?"#39ff14":"#ffd60a",color:"#000"}} onClick={next}>{isLast?"✅ テスト完了・メニューを生成する →":"次："+TESTS[idx+1].label+" →"}</Btn></>}

function Timer({exercise,onComplete}){
  const total=exercise.durationSec||30;
  const [t,setT]=useState(total);const [phase,setPhase]=useState("ready");const [set,setSet]=useState(1);const [rest,setRest]=useState(exercise.restSec||60);const iv=useRef(null);const sets=exercise.sets||3;
  const go=useCallback(()=>{setPhase("work");setT(total);clearInterval(iv.current);iv.current=setInterval(()=>{setT(v=>{if(v<=1){clearInterval(iv.current);if(set<sets){setPhase("rest");setRest(exercise.restSec||60);}else{setPhase("done");setTimeout(onComplete,1000);}return 0;}return v-1;});},1000);},[set,sets,total,exercise.restSec,onComplete]);
  const doRest=useCallback(()=>{clearInterval(iv.current);iv.current=setInterval(()=>{setRest(v=>{if(v<=1){clearInterval(iv.current);setSet(s=>s+1);setPhase("ready");return 0;}return v-1;});},1000);},[]);
  useEffect(()=>{if(phase==="rest")doRest();},[phase]);useEffect(()=>()=>clearInterval(iv.current),[]);
  const pct=phase==="work"?(t/total)*100:phase==="rest"?(rest/(exercise.restSec||60))*100:100;const R=65,circ=2*Math.PI*R;
  return(
    <div style={{textAlign:"center",padding:"4px 0"}}>
      <div style={{position:"relative",width:160,height:160,margin:"0 auto 10px"}}>
        <svg width="160" height="160" style={{transform:"rotate(-90deg)"}}><circle cx="80" cy="80" r={R} fill="none" stroke="#2a2a36" strokeWidth="7"/><circle cx="80" cy="80" r={R} fill="none" stroke={phase==="rest"?"#ffd60a":"#39ff14"} strokeWidth="7" strokeLinecap="round" strokeDasharray={circ} strokeDashoffset={circ-(pct/100)*circ} style={{transition:"stroke-dashoffset 0.9s linear"}}/></svg>
        <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",textAlign:"center"}}>
          {phase==="ready"&&<div style={{fontSize:20,fontWeight:800}}>準備OK</div>}
          {phase==="work"&&<><div style={{fontSize:40,fontWeight:800,color:"#39ff14",lineHeight:1}}>{t}</div><div style={{fontSize:10,color:"#666"}}>秒</div></>}
          {phase==="rest"&&<><div style={{fontSize:30,fontWeight:800,color:"#ffd60a"}}>{rest}</div><div style={{fontSize:10,color:"#ffd60a"}}>休憩</div></>}
          {phase==="done"&&<div style={{fontSize:18,fontWeight:800,color:"#39ff14"}}>完了✓</div>}
        </div>
      </div>
      <div style={{display:"flex",justifyContent:"center",gap:6,marginBottom:10}}>
        {Array.from({length:sets}).map((_,i)=><div key={i} style={{width:24,height:24,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,background:i+1<set?"#39ff14":i+1===set?"rgba(57,255,20,0.1)":"#25252f",border:`1px solid ${i+1<=set?"#39ff14":"#2a2a36"}`,color:i+1<set?"#000":i+1===set?"#39ff14":"#666"}}>{i+1<set?"✓":i+1}</div>)}
      </div>
      <div style={{fontSize:11,color:"#666",marginBottom:10}}>{phase==="work"&&`${exercise.reps} — フォームを意識！`}{phase==="rest"&&"次のセットまで休憩..."}{phase==="ready"&&`セット${set}の準備ができたらスタート`}{phase==="done"&&<span style={{color:"#39ff14"}}>完了！</span>}</div>
      {phase==="ready"&&<button onClick={go} style={{padding:"11px 32px",background:"#39ff14",color:"#000",border:"none",borderRadius:50,fontSize:14,fontWeight:800,cursor:"pointer"}}>▶ スタート</button>}
      {phase==="work"&&<button onClick={()=>{clearInterval(iv.current);setPhase("ready");setT(total);}} style={{padding:"9px 24px",background:"#25252f",color:"#666",border:"1px solid #2a2a36",borderRadius:50,fontSize:12,cursor:"pointer"}}>⏸ 停止</button>}
    </div>
  );
}

        </div>

    return()=>clearInterval(iv);
  },[status,lastGenDate]);

      +"\"scores\":{\"motivation\":1,\"level\":1,\"consistency\":1,\"overall\":1},"

    const menuMsg = "名前:"+profile.name+" 性別:"+profile.gender

    setSi(4);
    try{
      let parsed = null;

        try{ parsed = JSON.parse(text.replace(/```json|```/g,"").trim()); }
        catch(pe){ console.error("JSON parse error:",pe); }
      }
      if(!parsed) parsed = generateFallbackResult(profile,diag,goal,fitStr,todayType,todayFocus,posture||[]);

      setResult({...parsed,trainer,userTypes});
      setChat([{role:"ai",text:parsed.menu.greeting}]);
      setLastGenDate(todayStr);
      setStatus("done");
    }catch(e){
      console.error("menu error:",e);
      try{
        const fb        = generateFallbackResult(profile,diag,goal,fitStr,todayType,todayFocus,posture||[]);
        const trainer   = TRAINERS.find(t=>t.id===fb.trainerMatch?.id)||TRAINERS[0];
        const userTypes = (fb.userTypeIds||[]).map(id=>TYPES[id]).filter(Boolean);

        setChat([{role:"ai",text:fb.menu.greeting}]);
        setLastGenDate(todayStr);
        setStatus("done");
      }catch(e2){ setStatus("error"); }
    }
  };


  const saveRecord=(menu)=>{

    const bonusExp = (menu.exercises?.filter(e=>!e.isSeparator).length||0)*5;
    const totalExp = baseExp+bonusExp;
    const oldLvInfo= getLevelInfo(expState);
    const newExp   = addEXP(totalExp);
    const newLvInfo= getLevelInfo(newExp);
    setExpState(newExp);
    if(newLvInfo.lv > oldLvInfo.lv) setLevelUpInfo({oldLv:oldLvInfo,newLv:newLvInfo});
    setSavedMsg("✅ 記録完了！ +"+totalExp+" EXP");
    setTimeout(()=>setSavedMsg(""),3000);
  };

  const toggleFav=(menu)=>{
    if(isFav)return;

  const sendChat=async()=>{

    history.push({role:"user",content:txt});
    try{const reply=await callAI(history,sys,300);setChat(m=>[...m,{role:"ai",text:reply}]);}

          <div style={{display:"flex",gap:8,marginBottom:14}}>
            <button onClick={()=>toggleFav(menu)} style={{flex:1,padding:"9px",background:isFav?"rgba(255,215,10,0.15)":"#25252f",border:`1px solid ${isFav?"#ffd60a":"#2a2a36"}`,borderRadius:10,color:isFav?"#ffd60a":"#666",fontSize:12,fontWeight:700,cursor:"pointer"}}>{isFav?"⭐ 保存済み":"☆ お気に入り"}</button>
            <button onClick={()=>setShowCustomEdit(true)} style={{flex:1,padding:"9px",background:"rgba(204,68,255,0.1)",border:"1px solid #cc44ff44",borderRadius:10,color:"#cc44ff",fontSize:12,fontWeight:700,cursor:"pointer"}}>✏️ カスタム編集</button>
            <button onClick={()=>setShowHistory(true)} style={{flex:1,padding:"9px",background:"#25252f",border:"1px solid #2a2a36",borderRadius:10,color:"#666",fontSize:12,fontWeight:700,cursor:"pointer"}}>📋 履歴</button>
          </div>
          {menu.whyThisMenu&&<div style={{padding:"10px 12px",background:"rgba(204,68,255,0.1)",border:"1px solid rgba(204,68,255,0.4)",borderRadius:10,marginBottom:14}}><div style={{fontSize:10,color:"#cc44ff",fontWeight:700,marginBottom:3}}>🧠 このメニューを提案した理由</div><div style={{fontSize:12,color:"#666",lineHeight:1.6}}>{menu.whyThisMenu}</div></div>}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div><span style={S.lbl}>⚡ お任せメニュー</span><div style={{fontSize:15,fontWeight:800}}>{menu.theme}</div><span style={S.badge}>{menu.level}</span></div>
            <div style={{textAlign:"right"}}><div style={{fontSize:20,fontWeight:800,color:"#39ff14"}}>{menu.totalCalories}<span style={{fontSize:10}}>kcal</span></div><div style={{fontSize:10,color:"#666"}}>{menu.totalDuration}分</div></div>
          </div>
          {(()=>{
    let normalIdx=0;
    return menu.exercises?.map((ex,i)=>{
      if(ex.isSeparator){
        return(
          <div key={i} style={{padding:"10px 0",marginTop:6}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{flex:1,height:1,background:"linear-gradient(to right, #cc44ff44, transparent)"}}/>
              <div style={{fontSize:10,fontWeight:800,color:"#cc44ff",letterSpacing:1,whiteSpace:"nowrap"}}>🧍 姿勢改善メニュー</div>
              <div style={{flex:1,height:1,background:"linear-gradient(to left, #cc44ff44, transparent)"}}/>
            </div>
          </div>
        );
      }
      normalIdx++;
      return(
        <div key={i} style={{padding:"10px 0",borderBottom:"1px solid #2a2a36"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,fontSize:13}}>{normalIdx}. {ex.name}</div>
              <div style={{fontSize:11,color:"#666",marginTop:2}}>{ex.muscle} · 休憩{ex.restSec}秒</div>
              <div style={{fontSize:11,color:"#00c8ff",marginTop:3}}>📌 {ex.why}</div>
            </div>
            <div style={{textAlign:"right",minWidth:76}}>
              <span style={S.badge}>{ex.sets}セット</span>
              <div style={{fontSize:13,fontWeight:800,marginTop:3}}>{ex.reps}</div>
            </div>
          </div>
        </div>
      );
    });
  })()}
          {menu.closingTip&&<div style={{background:"rgba(57,255,20,0.1)",borderRadius:9,padding:"10px 12px",marginTop:12,border:"1px solid #1a6600"}}><div style={{fontSize:10,color:"#39ff14",fontWeight:700,marginBottom:2}}>💡 トレーニング後のアドバイス</div><div style={{fontSize:12,lineHeight:1.6}}>{menu.closingTip}</div></div>}
          <button onClick={()=>setPlaying(true)} style={{marginTop:14,width:"100%",padding:"14px",background:"#39ff14",color:"#000",border:"none",borderRadius:12,fontSize:15,fontWeight:800,cursor:"pointer"}}>▶ トレーニング開始</button>
          <Btn outline onClick={analyze} style={{marginTop:8}}>🔄 メニューを再生成（スケジュールも連携更新）</Btn>
          <Btn outline onClick={()=>setShowWeek(true)} style={{marginTop:8,borderColor:"#ffd60a",color:"#ffd60a"}}>📅 週間スケジュールを見る</Btn>
        </div>}

        {tab==="chat"&&<div style={{display:"flex",flexDirection:"column",flex:1,padding:"0 12px"}}>
          <div ref={chatRef} style={{overflowY:"auto",display:"flex",flexDirection:"column",padding:"12px 0",gap:6,minHeight:300,maxHeight:400}}>
            {chat.map((m,i)=><div key={i} style={{maxWidth:"85%",padding:"10px 13px",borderRadius:m.role==="ai"?"4px 14px 14px 14px":"14px 4px 14px 14px",background:m.role==="ai"?"#1e1e26":"rgba(57,255,20,0.1)",border:`1px solid ${m.role==="ai"?"#2a2a36":"#1a6600"}`,color:m.role==="ai"?"#e8e8e8":"#39ff14",fontSize:13,lineHeight:1.6,alignSelf:m.role==="ai"?"flex-start":"flex-end"}}>{m.role==="ai"&&<span style={{fontSize:14,marginRight:6}}>{trainer.emoji}</span>}{m.text}</div>)}
            {chatLoad&&<div style={{maxWidth:"85%",padding:"10px 13px",borderRadius:"4px 14px 14px 14px",background:"#1e1e26",border:"1px solid #2a2a36",fontSize:13,color:"#39ff14"}}>{trainer.emoji} ●●●</div>}
          </div>
          <div style={{display:"flex",gap:7,paddingBottom:6}}>
            <input style={{...S.inp,marginBottom:0,flex:1}} placeholder={trainer.name+"に相談する..."} value={chatIn} onChange={e=>setChatIn(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sendChat()}/>
            <button onClick={sendChat} style={{padding:"0 16px",background:"#39ff14",color:"#000",border:"none",borderRadius:10,fontWeight:800,cursor:"pointer",fontSize:18}}>→</button>
          </div>
          <div style={{display:"flex",gap:5,flexWrap:"wrap",paddingBottom:10}}>
            {["今日の調子が悪い","フォームを教えて","食事のコツ","モチベを上げて！"].map(q=><button key={q} onClick={()=>setChatIn(q)} style={{padding:"5px 10px",background:"#1e1e26",border:"1px solid #2a2a36",borderRadius:20,color:"#666",fontSize:11,cursor:"pointer"}}>{q}</button>)}
          </div>
        </div>}
      </div>
    </>
  );
}

function App(){
  const [step,setStep]=useState(0);
  const [profile,setProfile]=useState({name:"",gender:"",height:"",weight:""});
  const [avatar,setAvatar]=useState(()=>loadAvatar());
  const [goal,setGoal]=useState(null);
  const [posture,setPosture]=useState([]);
  const [diag,setDiag]=useState({});
  const [fit,setFit]=useState({});
  const next=()=>setStep(s=>s+1);
  const handleAvatarDone=(av)=>{setAvatar(av);next();};
  return(
    <div style={{minHeight:"100vh",background:"#16161a",color:"#e8e8e8",fontFamily:"'Segoe UI','Noto Sans JP',sans-serif",display:"flex",justifyContent:"center"}}>
      {step===0&&<Welcome onNext={next}/>}
      {step===1&&<AvatarCreate onDone={handleAvatarDone} profile={profile}/>}
      {step===2&&<Profile onNext={next} profile={profile} setProfile={setProfile}/>}
      {step===3&&<GoalSelect onNext={next} profile={profile} goal={goal} setGoal={setGoal}/>}
      {step===4&&<PostureCheck onNext={next} posture={posture} setPosture={setPosture}/>}
      {step===5&&<Diag onNext={next} profile={profile} diag={diag} setDiag={setDiag}/>}
      {step===6&&<FitnessTest onNext={next} fit={fit} setFit={setFit}/>}
      {step===7&&<Dashboard profile={profile} diag={diag} goal={goal} fit={fit} posture={posture} avatar={avatar} setAvatar={setAvatar}/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
